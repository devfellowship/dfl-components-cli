name: Publish @devfellowship/components-cli to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch | minor | major) or explicit version (e.g. 0.3.0)'
        required: true
        default: 'patch'
      tag:
        description: 'NPM dist-tag (latest | next | beta)'
        required: false
        default: 'latest'

permissions:
  contents: write
  id-token: write
  pull-requests: write   # needed for the version-bump-back PR (main is ruleset-protected, no direct push)

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Self-test version-compute logic
        working-directory: ${{ github.workspace }}
        run: bash scripts/compute-next-version.test.sh

      - name: Compute next version (from LIVE npm latest, not stale source)
        id: version
        run: |
          INPUT="${{ github.event.inputs.version }}"
          # Derive the next version from the version currently published on npm
          # — NOT from packages/cli/package.json, which lags whenever the
          # bump-back PR didn't merge. This guarantees the result is always
          # greater than npm's latest, so a plain `patch`/`minor`/`major`
          # dispatch never collides with the idempotency guard below.
          VERSION=$(bash "${{ github.workspace }}/scripts/compute-next-version.sh" "@devfellowship/components-cli" "$INPUT")
          echo "Computed next version: $VERSION"
          # Pin the in-tree package.json to the computed version so build +
          # publish emit the right version regardless of the stale source value.
          npm pkg set version="$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Idempotency guard: if the target version is already on npm, abort BEFORE
      # publishing so we never hit npm's "cannot publish over existing version"
      # error (and so re-runs of this workflow are safe / explicit).
      - name: Guard against re-publishing an existing version
        run: |
          TARGET="${{ steps.version.outputs.version }}"
          PUBLISHED=$(npm view @devfellowship/components-cli@"$TARGET" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$TARGET" ]; then
            echo "::error::@devfellowship/components-cli@$TARGET is already published to npm. Nothing to do — pick a higher version."
            exit 1
          fi
          echo "Version $TARGET is not yet on npm — proceeding to publish."

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public --tag ${{ github.event.inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # The publish above has ALREADY happened and succeeded by this point.
      # Syncing the source version back to `main` must NOT be able to fail the
      # overall publish — `main` is ruleset-protected (PR required, no direct
      # push), so a plain `git push origin HEAD` always 403'd, AND the
      # auto-opened bump PR never merged, leaving the source forever stale
      # (the recurring drift we're fixing). Robust behavior now:
      #   (a) push the git TAG (not covered by the branch ruleset).
      #   (b) commit the bump to a NEW branch, open a PR, then ADMIN-MERGE it
      #       in-workflow using RELEASE_SYNC_PAT (org-admin PAT that bypasses
      #       the `Protect Main` ruleset). Lands the bump deterministically.
      # `continue-on-error` keeps the publish green if the bump-back hiccups;
      # the Summary step makes the outcome loud. Falls back to GITHUB_TOKEN
      # (PR-only, no admin-merge) if RELEASE_SYNC_PAT is absent.
      - name: Sync version bump back to main (tag + PR + admin-merge)
        id: bumpback
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_SYNC_PAT || secrets.GITHUB_TOKEN }}
          HAVE_BYPASS_PAT: ${{ secrets.RELEASE_SYNC_PAT != '' }}
        run: |
          cd "${{ github.workspace }}"
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="chore/release-cli-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # (a) Tag the published commit and push the tag (allowed on protected main).
          git tag -f "cli-v${VERSION}"
          git push origin "cli-v${VERSION}"

          # (b) Open a PR with the source version bump (direct push to main is blocked).
          git checkout -b "$BRANCH"
          git add packages/cli/package.json
          git commit -m "chore(release): @devfellowship/components-cli v${VERSION}"
          git push -u origin "$BRANCH" --force-with-lease

          gh pr create \
            --title "chore(release): @devfellowship/components-cli v${VERSION}" \
            --body "Auto-opened by the publish workflow: npm published \`@devfellowship/components-cli@${VERSION}\`. Syncs source \`packages/cli/package.json\` to match. Tag \`cli-v${VERSION}\` pushed. Auto-admin-merged via RELEASE_SYNC_PAT." \
            --base main \
            --head "$BRANCH" \
            || echo "PR create skipped (one may already exist for $BRANCH)"

          # (c) Admin-merge the bump PR to land it on main past the ruleset.
          if [ "$HAVE_BYPASS_PAT" = "true" ]; then
            gh pr merge "$BRANCH" --admin --squash --delete-branch \
              || gh pr merge "$BRANCH" --admin --merge --delete-branch \
              || { echo "::warning::admin-merge of $BRANCH failed; merge it manually."; exit 1; }
            echo "Admin-merged $BRANCH into main."
          else
            echo "::warning::RELEASE_SYNC_PAT not set — opened PR for $BRANCH but cannot admin-merge. Merge it manually to sync the source."
            exit 1
          fi

      - name: Publish summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Publish result"
            echo ""
            echo "- 📦 Published \`@devfellowship/components-cli@${VERSION}\` to npm (tag: \`${{ github.event.inputs.tag }}\`)."
            if [ "${{ steps.bumpback.outcome }}" = "success" ]; then
              echo "- ✅ Pushed tag \`cli-v${VERSION}\` and admin-merged the source-sync PR into \`main\`. Source + npm are in lockstep."
            else
              echo "- ⚠️ The tag/PR/admin-merge bump-back step did not fully complete. The npm publish still succeeded, but the source version may not be synced — check for an open \`chore/release-cli-v${VERSION}\` PR and merge it (and confirm tag \`cli-v${VERSION}\`). Likely cause: \`RELEASE_SYNC_PAT\` missing or lacking ruleset bypass."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
