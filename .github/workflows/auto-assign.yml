# Public repo: self-hosted dfl-runner blocked (allows_public=false) + cannot call private dfl-ci reusable workflows. Inlined on ubuntu-latest. Authorized Tainan TG 2026-06-06 (public-repo carve-out) + TG 2026-06-10.
name: Auto-assign PR author

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  assign:
    runs-on: ubuntu-latest
    # Housekeeping job — never block the PR rollup on it.
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - name: Assign PR author (best-effort)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          # User-token PAT — App installation tokens cannot assign agents (403).
          github-token: ${{ secrets.ORG_ADMIN_PAT || github.token }}
          script: |
            const author = context.payload.pull_request.user.login;
            const type = context.payload.pull_request.user.type; // "User" or "Bot"

            // [bot] accounts (dependabot, renovate, etc.) cannot be assigned — skip cleanly.
            if (type === 'Bot' || author.endsWith('[bot]')) {
              core.info(`Author "${author}" is a bot account; skipping self-assign (bots can't be assignees).`);
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                assignees: [author],
              });
              core.info(`Assigned PR #${context.payload.pull_request.number} to ${author}.`);
            } catch (err) {
              // Outside collaborators / suspended users / transient API errors must not fail CI.
              core.warning(`Could not assign PR author "${author}" (non-blocking): ${err.message}`);
            }
