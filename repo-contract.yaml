# repo-contract.yaml — Machine-readable contract for dfl-components-cli
# This repo publishes ONE npm package: @devfellowship/components (packages/ui/).
# It ships the React UI library (consumed as library imports) + the
# `dfl-components` CLI bin (currently: the `ux-paths` subcommand group).

name: dfl-components-cli
description: >
  The DevFellowship design system. Publishes @devfellowship/components — a React
  UI component library (consumed via `import { Button } from
  "@devfellowship/components"`) plus the `dfl-components` CLI bin for versioned
  per-app UX-path mapping (`ux-paths`). The shadcn-style component registry and
  the `add`/`init` scaffolding commands were REMOVED in v3.0.0 (a fleet-wide
  audit found zero consumers).

type: platform

# ─── What this repo provides to the ecosystem ───────────────────────────

provides:
  - type: package
    name: "@devfellowship/components"
    description: >
      The DFL design-system package. Ships BOTH the React UI library AND the
      `dfl-components` CLI bin (Commander.js + tsup) — the CLI was folded in so
      DFL apps only ever depend on ONE published npm package. The standalone
      "@devfellowship/components-cli" package is DEPRECATED (folded in here).
      CLI commands: the `ux-paths` subcommand group
      (init/validate/generate-mermaid/diff/stamp) + the `check-style-imports`
      guard. Components are consumed as LIBRARY IMPORTS, not scaffolded.
    entry: packages/ui/dist/cli.js
    bin: dfl-components
    invocation: npx @devfellowship/components ux-paths <cmd>
    library_import: 'import { Button } from "@devfellowship/components"'

# ─── CLI commands reference ─────────────────────────────────────────────

cli_commands:
  ux-paths:
    usage: npx @devfellowship/components ux-paths <init|validate|generate-mermaid|diff|stamp>
    description: >
      Versioned, schema-validated per-app user-flow mapping. Maps an app's
      screens/actions/flows into a versioned `.dfl-ux-paths/flows.json` (schema
      in devfellowship/dfl-ux-paths).
  check-style-imports:
    usage: npx @devfellowship/components check-style-imports [dir]
    description: >
      Guard against an app importing BOTH @devfellowship/components/styles and
      /shadcn (which clobbers semantic color vars).

# ─── What this repo consumes ────────────────────────────────────────────

consumes: []

# ─── Consumer repos (who uses this package) ─────────────────────────────

consumers:
  - dfl-learn
  - dfl-tracks
  - dfl-dbms
  - dfl-iam
  - dfl-apps
  - dfl-financing
  - dfl-documents
  - dfl-event-management
  - dfl-reviews
  - dfl-skill-evals
  - dfl-social-proof
  - dfl-wiki
  - dfl-flows
  - dfl-notifications
  - dfl-seo
  - dfl-bmcanvas
  - dfl-thumbify
  - dfl-vaults
  - dfl-course-shaper
  - dfl-lesson-studio

# ─── Environment variables ──────────────────────────────────────────────

environment:
  required: []
  optional: []

# ─── Health & entry points ──────────────────────────────────────────────

health_check:
  command: cd packages/ui && npm run build
  cli_check: cd packages/ui && npm run build:cli

scripts:
  build: cd packages/ui && npm run build        # tsup: library + CLI bundles
  build_lib: cd packages/ui && npm run build:lib
  build_cli: cd packages/ui && npm run build:cli  # tsup --config tsup.cli.config.ts
  typecheck: cd packages/ui && npm run typecheck
  test: cd packages/ui && npm test               # vitest run
  storybook: cd packages/ui && npm run storybook

agent_entry_point: CLAUDE.md
